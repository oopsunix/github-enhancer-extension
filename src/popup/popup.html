<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="ge-popup">
    <header class="ge-header">
      <h1 class="ge-title">GitHub Enhancer</h1>
      <span class="ge-version">v1.0.0</span>
    </header>

    <section class="ge-module" data-module="material-icons">
      <div class="ge-module-header">
        <div class="ge-module-info">
          <span class="ge-module-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-folder-heart-icon lucide-folder-heart"><path d="M10.638 20H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H20a2 2 0 0 1 2 2v3.417"/><path d="M14.62 18.8A2.25 2.25 0 1 1 18 15.836a2.25 2.25 0 1 1 3.38 2.966l-2.626 2.856a.998.998 0 0 1-1.507 0z"/></svg></span>
          <div>
            <div class="ge-module-name">Material 图标</div>
            <div class="ge-module-desc">为文件和文件夹显示 Material Design 风格图标</div>
          </div>
        </div>
        <label class="ge-switch">
          <input type="checkbox" data-key="mi_enabled">
          <span class="ge-slider"></span>
        </label>
      </div>
    </section>

    <section class="ge-module" data-module="back-to-top">
      <div class="ge-module-header">
        <div class="ge-module-info">
          <span class="ge-module-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></span>
          <div>
            <div class="ge-module-name">返回顶部</div>
            <div class="ge-module-desc">页面滚动时显示返回按钮</div>
          </div>
        </div>
        <label class="ge-switch">
          <input type="checkbox" data-key="bt_enabled">
          <span class="ge-slider"></span>
        </label>
      </div>
      <div class="ge-module-options" style="display:none;">
        <div class="ge-option-row">
          <label>位置：</label>
          <select class="ge-select" data-key="bt_position">
            <option value="right">右下角</option>
            <option value="left">左下角</option>
          </select>
        </div>
        <div class="ge-option-row">
          <label>触发滚动：</label>
          <input type="number" class="ge-input ge-input-sm" data-key="bt_threshold" value="300" min="0" step="50"> px
        </div>
      </div>
    </section>

    <section class="ge-module" data-module="time-format">
      <div class="ge-module-header">
        <div class="ge-module-info">
          <span class="ge-module-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
          <div>
            <div class="ge-module-name">时间格式化</div>
            <div class="ge-module-desc">将相对时间替换为自定义格式</div>
          </div>
        </div>
        <label class="ge-switch">
          <input type="checkbox" data-key="tf_enabled">
          <span class="ge-slider"></span>
        </label>
      </div>
      <div class="ge-module-options" style="display:none;">
        <div class="ge-option-row">
          <label>格式：</label>
          <input type="text" class="ge-input" data-key="tf_pattern" value="YY-MM-DD HH:mm" placeholder="例: YYYY-MM-DD HH:mm:ss">
        </div>
      </div>
    </section>

    <section class="ge-module" data-module="image-file-layout">
      <div class="ge-module-header">
        <div class="ge-module-info">
          <span class="ge-module-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span>
          <div>
            <div class="ge-module-name">图片文件布局</div>
            <div class="ge-module-desc">图片文件列表平铺/全宽切换</div>
          </div>
        </div>
        <label class="ge-switch">
          <input type="checkbox" data-key="fl_enabled">
          <span class="ge-slider"></span>
        </label>
      </div>
      <div class="ge-module-options" style="display:none;">
        <div class="ge-option-row">
          <label>默认视图：</label>
          <select class="ge-select" data-key="fl_mode">
            <option value="list">列表模式</option>
            <option value="tiled">平铺模式</option>
            <option value="fullw">全宽模式</option>
          </select>
        </div>
      </div>
    </section>

    <section class="ge-module" data-module="image-preview">
      <div class="ge-module-header">
        <div class="ge-module-info">
          <span class="ge-module-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></span>
          <div>
            <div class="ge-module-name">图片预览</div>
            <div class="ge-module-desc">单击图片放大预览，支持缩放拖拽切换</div>
          </div>
        </div>
        <label class="ge-switch">
          <input type="checkbox" data-key="ip_enabled">
          <span class="ge-slider"></span>
        </label>
      </div>
    </section>

    <section class="ge-module" data-module="repo-size">
      <div class="ge-module-header">
        <div class="ge-module-info">
          <span class="ge-module-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-file-cog-icon lucide-file-cog"><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="m2.305 15.53.923-.382"/><path d="m3.228 12.852-.924-.383"/><path d="M4.677 21.5a2 2 0 0 0 1.313.5H18a2 2 0 0 0 2-2V7l-5-5H6a2 2 0 0 0-2 2v2.5"/><path d="m4.852 11.228-.383-.923"/><path d="m4.852 16.772-.383.924"/><path d="m7.148 11.228.383-.923"/><path d="m7.53 17.696-.382-.924"/><path d="m8.772 12.852.923-.383"/><path d="m8.772 15.148.923.383"/><circle cx="6" cy="14" r="3"/></svg></span>
          <div>
            <div class="ge-module-name">文件大小</div>
            <div class="ge-module-desc">显示仓库和文件大小</div>
          </div>
        </div>
        <label class="ge-switch">
          <input type="checkbox" data-key="rs_enabled">
          <span class="ge-slider"></span>
        </label>
      </div>
      <div class="ge-module-options" style="display:none;">
        <div class="ge-option-row">
          <label>Token：</label>
          <input type="password" class="ge-input" data-key="rs_token" placeholder="可选，用于提高 API 限额">
        </div>
      </div>
    </section>

    <footer class="ge-footer">
      <div class="ge-footer-left">
        <div class="ge-footer-author">Made by <a href="https://github.com/oopsunix" target="_blank">oopsunix</a></div>
        <div class="ge-footer-star">如果这个扩展对您有帮助，不妨前往 GitHub 为本项目点个 <a href="https://github.com/oopsunix/github-enhancer-extension" target="_blank">⭐</a> ，让更多人发现和使用！</div>
      </div>
      <div class="ge-footer-right">
        <span class="ge-status" id="ge-status"></span>
        <a class="ge-footer-github" href="https://github.com/oopsunix/github-enhancer-extension" target="_blank" title="在 GitHub 上查看">
          <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        </a>
      </div>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
